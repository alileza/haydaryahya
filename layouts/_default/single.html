{{ define "main" }}
<article class="article">
  <header class="article-header">
    <h1>{{ .Title }}</h1>
    <div class="byline">
      <span class="byline-author">{{ .Params.author }}</span>
      <span class="byline-date">{{ .Date.Format "Jan 2, 2006" }}</span>
    </div>
  </header>

  <section class="article-body">
    {{ .Content }}
  </section>

  {{ with .Params.pdf }}
  <footer class="article-footer">
    <a href="{{ . }}">Open original PDF</a>
  </footer>
  {{ end }}
</article>
{{ end }}
