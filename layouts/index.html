{{ define "main" }}
<div class="feed">
  {{ range (where .Site.RegularPages "Section" "posts").ByDate.Reverse }}
  <a href="{{ .RelPermalink }}" class="feed-item">
    <h2 class="feed-title">{{ .Title }}</h2>
    {{ with .Params.excerpt }}<p class="feed-excerpt">{{ . }}</p>{{ end }}
    <p class="feed-meta">{{ .Params.author }} · {{ .Date.Format "Jan 2, 2006" }}</p>
  </a>
  {{ end }}
</div>
{{ end }}
